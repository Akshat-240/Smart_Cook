<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCook — Prediction History</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --g900:#062e21;--g800:#085041;--g700:#0F6E56;--g600:#1D9E75;
  --g400:#5DCAA5;--g200:#9FE1CB;--g100:#C8F0E2;--g50:#E1F5EE;
  --amber:#EF9F27;--amberd:#854F0B;--amberl:#FAEEDA;
  --red:#e24b4a;--redd:#A32D2D;--redl:#FCEBEB;
  --bg:#f2f0eb;--white:#fff;
  --gray9:#1a1a18;--gray7:#3a3a38;--gray5:#6b6b68;--gray3:#c8c6be;--gray1:#eeece8;
  --r8:8px;--r12:12px;--r18:18px;--r24:24px;
  --shadow:0 2px 8px rgba(0,0,0,0.07);--shadowmd:0 6px 20px rgba(0,0,0,0.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--gray9);-webkit-font-smoothing:antialiased;min-height:100vh}

/* NAVBAR */
.navbar{background:var(--g800);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.nav-in{max-width:960px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;background:var(--g600);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.brand-name{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;letter-spacing:.02em}
.nav-link{color:var(--g200);text-decoration:none;font-size:13px;font-weight:500;transition:color .2s}
.nav-link:hover{color:#fff}

/* CONTAINER */
.wrap{max-width:960px;margin:0 auto;padding:28px 24px 60px}

/* PAGE HEADER */
.ph{margin-bottom:24px;animation:fadeUp .4s ease both}
.ph-title{font-family:'DM Serif Display',serif;font-size:38px;color:var(--g800);margin-bottom:4px}
.ph-sub{font-size:14px;color:var(--gray5)}

/* STATS ROW */
.hstats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;animation:fadeUp .4s .05s ease both}
.hs{background:var(--white);border-radius:var(--r18);padding:18px 20px;box-shadow:var(--shadow);transition:transform .2s}
.hs:hover{transform:translateY(-2px)}
.hs.green{background:var(--g50);border:1px solid var(--g100)}
.hs-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--gray5);margin-bottom:6px}
.hs-val{font-family:'DM Serif Display',serif;font-size:30px;color:var(--g700)}
.hs:not(.green) .hs-val{color:var(--gray9)}

/* CHART */
.chart-card{background:var(--white);border-radius:var(--r18);padding:22px;box-shadow:var(--shadow);margin-bottom:20px;animation:fadeUp .4s .1s ease both}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--gray5);margin-bottom:12px}

/* FILTER BAR */
.filter-bar{background:var(--white);border-radius:var(--r18);padding:18px 22px;display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;margin-bottom:14px;box-shadow:var(--shadow);animation:fadeUp .4s .12s ease both}
.fg{display:flex;flex-direction:column;gap:5px}
.flbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray5)}
.finput,.fsel{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gray9);background:var(--gray1);border:1.5px solid transparent;border-radius:var(--r8);padding:8px 12px;outline:none;transition:border-color .2s;min-width:130px}
.finput:focus,.fsel:focus{border-color:var(--g600)}
.abtn{padding:9px 22px;background:var(--g800);color:#fff;border:none;border-radius:var(--r8);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.abtn:hover{background:var(--g700)}
.rbtn{padding:9px 16px;background:var(--white);color:var(--gray5);border:1.5px solid var(--gray3);border-radius:var(--r8);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.rbtn:hover{background:var(--gray1)}

.rec-count{font-size:13px;color:var(--gray5);margin-bottom:10px}

/* TABLE */
.table-wrap{background:var(--white);border-radius:var(--r18);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px;animation:fadeUp .4s .15s ease both}
.htable{width:100%;border-collapse:collapse;font-size:13px}
.htable thead tr{background:var(--g800)}
.htable thead th{padding:13px 16px;color:var(--g100);font-weight:500;font-size:11px;text-align:left;white-space:nowrap}
.htable thead th.sort{cursor:pointer;user-select:none}
.htable thead th.sort:hover{background:var(--g700)}
.si{font-size:10px;opacity:.6;margin-left:3px}
.htable tbody tr{border-bottom:1px solid var(--gray1);transition:background .15s}
.htable tbody tr:hover{background:var(--g50)}
.htable tbody tr:last-child{border:none}
.htable td{padding:12px 16px;color:var(--gray7)}
.htable td.dc{font-weight:600;color:var(--gray9)}

.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.b-none{background:var(--g50);color:var(--g700)}
.b-weekend{background:#EEEDFE;color:#3C3489}
.b-festival{background:var(--amberl);color:var(--amberd)}
.b-exam{background:var(--redl);color:var(--redd)}
.b-lunch{background:var(--g50);color:var(--g700)}
.b-breakfast{background:var(--amberl);color:var(--amberd)}
.b-dinner{background:#EEEDFE;color:#3C3489}

.wok{color:var(--g700);font-weight:600}
.wwarn{color:var(--amberd);font-weight:600}
.wbad{color:var(--redd);font-weight:600}

/* EXPORT */
.export-btn{padding:11px 22px;background:var(--white);color:var(--g700);border:2px solid var(--g400);border-radius:var(--r8);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.export-btn:hover{background:var(--g50)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){
  .hstats{grid-template-columns:1fr 1fr}
  .filter-bar{flex-direction:column}
  .finput,.fsel{min-width:100%}
  .abtn,.rbtn{width:100%}
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-in">
    <div class="brand">
      <div class="brand-icon">🍽</div>
      <span class="brand-name">SmartCook</span>
    </div>
    <a href="/" class="nav-link">← Dashboard</a>
  </div>
</nav>

<div class="wrap">

  <div class="ph">
    <h1 class="ph-title">Prediction History</h1>
    <p class="ph-sub">Track model performance over time</p>
  </div>

  <div class="hstats">
    <div class="hs"><div class="hs-lbl">Sessions logged</div><div class="hs-val" id="hSess">8</div></div>
    <div class="hs green"><div class="hs-lbl">Avg waste</div><div class="hs-val" id="hAvg">11.73%</div></div>
    <div class="hs green"><div class="hs-lbl">Money wasted</div><div class="hs-val" id="hMoney">₹10,380</div></div>
    <div class="hs"><div class="hs-lbl">Best day</div><div class="hs-val" id="hBest">4.21%</div></div>
  </div>

  <div class="sec-title">Waste % over time</div>
  <div class="chart-card">
    <canvas id="hChart" height="160"></canvas>
  </div>

  <div class="filter-bar">
    <div class="fg"><label class="flbl">From</label><input type="date" class="finput" id="fFrom"></div>
    <div class="fg"><label class="flbl">To</label><input type="date" class="finput" id="fTo"></div>
    <div class="fg"><label class="flbl">Meal</label>
      <select class="fsel" id="fMeal">
        <option value="all">All meals</option>
        <option value="breakfast">Breakfast</option>
        <option value="lunch">Lunch</option>
        <option value="dinner">Dinner</option>
      </select>
    </div>
    <div class="fg"><label class="flbl">Event</label>
      <select class="fsel" id="fEvent">
        <option value="all">All events</option>
        <option value="none">None</option>
        <option value="weekend">Weekend</option>
        <option value="festival">Festival</option>
        <option value="exam">Exam</option>
      </select>
    </div>
    <button class="abtn" onclick="applyF()">Apply</button>
    <button class="rbtn" onclick="resetF()">Reset</button>
  </div>

  <div class="rec-count" id="recCount">Showing 8 records</div>

  <div class="table-wrap">
    <table class="htable" id="htable">
      <thead><tr>
        <th class="sort" onclick="srt('date')">Date <span class="si">↕</span></th>
        <th>Meal</th>
        <th class="sort" onclick="srt('actual')">Actual <span class="si">↕</span></th>
        <th class="sort" onclick="srt('cooked')">Cooked for <span class="si">↕</span></th>
        <th class="sort" onclick="srt('wasted')">Wasted <span class="si">↕</span></th>
        <th class="sort" onclick="srt('wp')">Waste % <span class="si">↕</span></th>
        <th>Event</th>
      </tr></thead>
      <tbody id="htbody"></tbody>
    </table>
  </div>

  <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
</div>

<script>
let ALL=[
  {date:'27 Apr 2026',day:'Mon',meal:'lunch',    actual:182,cooked:190,wasted:8, wp:4.21, ev:'none'},
  {date:'26 Apr 2026',day:'Sun',meal:'lunch',    actual:110,cooked:140,wasted:30,wp:21.43,ev:'weekend'},
  {date:'25 Apr 2026',day:'Sat',meal:'lunch',    actual:120,cooked:150,wasted:30,wp:20.00,ev:'weekend'},
  {date:'24 Apr 2026',day:'Fri',meal:'lunch',    actual:185,cooked:195,wasted:10,wp:5.13, ev:'none'},
  {date:'23 Apr 2026',day:'Thu',meal:'lunch',    actual:190,cooked:200,wasted:10,wp:5.00, ev:'none'},
  {date:'22 Apr 2026',day:'Wed',meal:'lunch',    actual:160,cooked:210,wasted:50,wp:23.81,ev:'festival'},
  {date:'21 Apr 2026',day:'Tue',meal:'lunch',    actual:175,cooked:190,wasted:15,wp:7.89, ev:'none'},
  {date:'20 Apr 2026',day:'Mon',meal:'lunch',    actual:180,cooked:200,wasted:20,wp:10.00,ev:'none'},
];

let fil=[...ALL],sortK='date',sortA=false,hc=null;

window.addEventListener('DOMContentLoaded',()=>{loadLiveLogs();updateStats();renderTable();buildChart();});

function displayDate(isoDate){
  return new Date(isoDate).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}

function displayDay(isoDate){
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(isoDate).getDay()];
}

async function loadLiveLogs(){
  try{
    const res=await fetch('/logs');
    if(!res.ok)return;
    const payload=await res.json();
    const logs=payload.logs||[];
    if(!logs.length)return;
    ALL=logs.map(l=>({
      date:displayDate(l.date),
      day:displayDay(l.date),
      meal:l.meal_type.toLowerCase(),
      actual:l.actual_headcount,
      cooked:l.cooked_for,
      wasted:l.waste_headcount,
      wp:l.waste_percentage,
      ev:l.event_flag
    }));
    fil=[...ALL];
    updateStats();renderTable();updateChart();
  }catch(_){}
}

function updateStats(){
  const n=fil.length;
  const avg=fil.reduce((s,r)=>s+r.wp,0)/(n||1);
  const money=fil.reduce((s,r)=>s+r.wasted,0)*60;
  const best=n?Math.min(...fil.map(r=>r.wp)):0;
  document.getElementById('hSess').textContent=n;
  document.getElementById('hAvg').textContent=avg.toFixed(2)+'%';
  document.getElementById('hMoney').textContent='₹'+money.toLocaleString('en-IN');
  document.getElementById('hBest').textContent=n?best.toFixed(2)+'%':'—';
  document.getElementById('recCount').textContent=`Showing ${n} record${n!==1?'s':''}`;
}

function renderTable(){
  document.getElementById('htbody').innerHTML=fil.map((r,i)=>`
    <tr style="animation:fadeUp .25s ${i*.04}s ease both;opacity:0;animation-fill-mode:forwards">
      <td class="dc">${r.date} <span style="font-size:11px;color:#999;font-weight:400">${r.day}</span></td>
      <td><span class="badge b-${r.meal}">${cap(r.meal)}</span></td>
      <td>${r.actual}</td>
      <td>${r.cooked}</td>
      <td>${r.wasted}</td>
      <td class="${wc(r.wp)}">${r.wp.toFixed(2)}%</td>
      <td><span class="badge b-${r.ev}">${r.ev}</span></td>
    </tr>`).join('');
}

function srt(k){
  if(sortK===k)sortA=!sortA; else{sortK=k;sortA=false;}
  fil.sort((a,b)=>typeof a[k]==='string'?(sortA?a[k].localeCompare(b[k]):b[k].localeCompare(a[k])):(sortA?a[k]-b[k]:b[k]-a[k]));
  document.querySelectorAll('.si').forEach(e=>e.textContent='↕');
  event.currentTarget.querySelector('.si').textContent=sortA?'↑':'↓';
  renderTable();
}

function applyF(){
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  const meal=document.getElementById('fMeal').value;
  const ev=document.getElementById('fEvent').value;
  fil=ALL.filter(r=>{
    const d=new Date(r.date);
    if(from&&d<new Date(from))return false;
    if(to&&d>new Date(to))return false;
    if(meal!=='all'&&r.meal!==meal)return false;
    if(ev!=='all'&&r.ev!==ev)return false;
    return true;
  });
  updateStats();renderTable();updateChart();
}
function resetF(){
  document.getElementById('fFrom').value='';
  document.getElementById('fTo').value='';
  document.getElementById('fMeal').value='all';
  document.getElementById('fEvent').value='all';
  fil=[...ALL];updateStats();renderTable();updateChart();
}

function buildChart(){
  const rev=[...ALL].reverse();
  const labels=rev.map(r=>r.date.slice(0,6));
  const vals=rev.map(r=>r.wp);
  hc=new Chart(document.getElementById('hChart').getContext('2d'),{
    type:'bar',
    data:{labels,datasets:[{
      label:'Waste %',data:vals,
      backgroundColor:vals.map(v=>v<10?'rgba(15,110,86,0.75)':v<20?'rgba(239,159,39,0.75)':'rgba(162,45,45,0.75)'),
      borderRadius:6,borderSkipped:false
    }]},
    options:{responsive:true,plugins:{
      legend:{display:false},
      tooltip:{backgroundColor:'#fff',titleColor:'#1a1a18',bodyColor:'#6b6b68',borderColor:'#e8e6e2',borderWidth:1,padding:12,cornerRadius:10,
        titleFont:{family:"'DM Sans',sans-serif",size:12,weight:'600'},
        bodyFont:{family:"'DM Sans',sans-serif",size:12},
        callbacks:{label:c=>` Waste: ${c.parsed.y.toFixed(2)}%`}}
    },
    scales:{
      x:{grid:{display:false},ticks:{font:{family:"'DM Sans',sans-serif",size:11},color:'#999'}},
      y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{family:"'DM Sans',sans-serif",size:11},color:'#999',callback:v=>v+'%'},max:30}
    }}
  });
}
function updateChart(){
  if(!hc)return;
  const rev=[...fil].reverse();
  hc.data.labels=rev.map(r=>r.date.slice(0,6));
  const v=rev.map(r=>r.wp);
  hc.data.datasets[0].data=v;
  hc.data.datasets[0].backgroundColor=v.map(x=>x<10?'rgba(15,110,86,0.75)':x<20?'rgba(239,159,39,0.75)':'rgba(162,45,45,0.75)');
  hc.update();
}

function exportCSV(){
  const h=['Date','Day','Meal','Actual','Cooked','Wasted','Waste%','Event'];
  const rows=fil.map(r=>[r.date,r.day,r.meal,r.actual,r.cooked,r.wasted,r.wp.toFixed(2),r.ev]);
  const csv=[h,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='smartcook_history.csv';a.click();
}

function wc(p){return p<10?'wok':p<20?'wwarn':'wbad'}
function cap(s){return s[0].toUpperCase()+s.slice(1)}
</script>
</body>
</html>
